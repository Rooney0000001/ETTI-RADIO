<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETTI RADIO — Producer Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0b1530;
    --navy-deep:#070d1f;
    --gold:#f2b705;
    --gold-dim:#c9960a;
    --crimson:#c21807;
    --cream:#f3ecd9;
    --line: rgba(242,183,5,0.18);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:
      radial-gradient(ellipse 120% 60% at 50% -10%, rgba(194,24,7,0.15), transparent 60%),
      linear-gradient(180deg, var(--navy) 0%, var(--navy-deep) 100%);
    color:var(--cream);
    font-family:'Work Sans', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 18px;
  }
  .card{
    background:rgba(255,255,255,0.03);
    border:1px solid var(--line);
    border-radius:16px;
    padding:32px 24px;
    max-width:440px;
    width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--crimson);
    margin-bottom:8px;
  }
  h1{
    font-family:'Bebas Neue', sans-serif;
    font-size:32px;
    letter-spacing:1.5px;
    color:var(--gold);
    margin-bottom:6px;
  }
  .sub{
    font-size:13px;
    color:rgba(243,236,217,0.55);
    margin-bottom:26px;
    line-height:1.5;
  }

  /* Status badge */
  .status-badge{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 16px;
    border-radius:10px;
    margin-bottom:26px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:1px;
  }
  .status-badge.offline{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.1);
    color:rgba(243,236,217,0.5);
  }
  .status-badge.live{
    background:rgba(194,24,7,0.12);
    border:1px solid var(--crimson);
    color:#ff6b52;
  }
  .status-dot{
    width:9px; height:9px;
    border-radius:50%;
    flex-shrink:0;
  }
  .status-badge.offline .status-dot{ background:rgba(243,236,217,0.3); }
  .status-badge.live .status-dot{
    background:var(--crimson);
    animation:pulse 1.6s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(194,24,7,0.55);}
    70%{box-shadow:0 0 0 8px rgba(194,24,7,0);}
    100%{box-shadow:0 0 0 0 rgba(194,24,7,0);}
  }

  label{
    display:block;
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:rgba(243,236,217,0.6);
    margin-bottom:8px;
    margin-top:20px;
  }
  input[type="text"], input[type="password"]{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:1px solid var(--line);
    background:rgba(0,0,0,0.35);
    color:var(--cream);
    font-size:14px;
  }
  input:focus{ outline:2px solid var(--gold); }

  #mainBtn{
    width:100%;
    padding:16px;
    border-radius:10px;
    border:none;
    font-size:15px;
    font-weight:700;
    letter-spacing:0.5px;
    cursor:pointer;
    margin-top:26px;
    transition:background .2s;
  }
  #mainBtn.start{ background:var(--crimson); color:white; }
  #mainBtn.end{ background:transparent; border:1.5px solid var(--gold); color:var(--gold); }
  #mainBtn:disabled{ opacity:0.5; cursor:not-allowed; }

  #linkGroup{ transition:opacity .2s; }

  #statusMsg{
    margin-top:16px;
    font-size:13px;
    padding:11px;
    border-radius:8px;
    display:none;
  }
  #statusMsg.success{ background:rgba(46,204,113,0.15); color:#6be29a; display:block; }
  #statusMsg.error{ background:rgba(194,24,7,0.15); color:#ff8a75; display:block; }
  .reminder{
    display:none;
    background:rgba(242,183,5,0.1);
    border:1px solid var(--gold-dim);
    color:var(--gold);
    font-size:12.5px;
    line-height:1.5;
    padding:12px 14px;
    border-radius:10px;
    margin-bottom:20px;
  }
  .reminder.show{ display:block; }
</style>
</head>
<body>

<div class="card">
  <div class="eyebrow">ETTI Radio</div>
  <h1>Producer Panel</h1>
  <div class="sub">Control the live stream shown on the website.</div>

  <div class="status-badge offline" id="statusBadge">
    <span class="status-dot"></span>
    <span id="statusText">Checking status...</span>
  </div>

  <div class="reminder" id="reminderBanner">
    ⚠️ Don't forget to tap <strong>End Broadcast</strong> when you finish streaming — the website keeps showing this stream until you do, and it also gets saved to the Video Archive automatically when you end it properly.
  </div>

  <label>Producer Password</label>
  <input type="password" id="password" placeholder="Enter password">

  <div id="linkGroup">
    <label>Facebook Live Video Link</label>
    <input type="text" id="liveUrl" placeholder="Paste link when starting a stream">
  </div>

  <button id="mainBtn" class="start" onclick="handleToggle()">Start Stream</button>
  <div id="statusMsg"></div>
</div>

<script>
  // IMPORTANT: paste your Cloudflare Worker URL here after deploying it
  const API_BASE = "https://etti-radio-backend.rooneywonder90.workers.dev";
  let isLive = false;

  async function refreshStatus(){
    const badge = document.getElementById('statusBadge');
    const text = document.getElementById('statusText');
    const btn = document.getElementById('mainBtn');
    const linkGroup = document.getElementById('linkGroup');
    const liveUrlInput = document.getElementById('liveUrl');

    try{
      const res = await fetch(API_BASE + '/api/live');
      const data = await res.json();
      isLive = !!(data.liveUrl && data.liveUrl.trim() !== '');

      if(isLive){
        badge.className = 'status-badge live';
        text.textContent = 'LIVE NOW';
        btn.className = 'end';
        btn.textContent = 'End Broadcast';
        linkGroup.style.display = 'none';
        liveUrlInput.value = data.liveUrl;
        document.getElementById('reminderBanner').classList.add('show');
      } else {
        badge.className = 'status-badge offline';
        text.textContent = 'OFFLINE';
        btn.className = 'start';
        btn.textContent = 'Start Stream';
        linkGroup.style.display = 'block';
        document.getElementById('reminderBanner').classList.remove('show');
      }
    } catch(e){
      text.textContent = 'Could not check status';
    }
  }

  async function handleToggle(){
    const password = document.getElementById('password').value;
    const liveUrlInput = document.getElementById('liveUrl');
    const btn = document.getElementById('mainBtn');
    const statusMsg = document.getElementById('statusMsg');

    statusMsg.className = '';
    statusMsg.style.display = 'none';

    if(!password){
      statusMsg.className = 'error';
      statusMsg.textContent = 'Enter the producer password first.';
      return;
    }

    // Decide what we're doing based on current state
    const goingLive = !isLive;
    const urlToSend = goingLive ? liveUrlInput.value.trim() : '';

    if(goingLive && !urlToSend){
      statusMsg.className = 'error';
      statusMsg.textContent = 'Paste the live video link before starting.';
      return;
    }

    btn.disabled = true;
    btn.textContent = goingLive ? 'Starting...' : 'Ending...';

    try{
      const res = await fetch(API_BASE + '/api/live', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ password, liveUrl: urlToSend })
      });
      const data = await res.json();

      if(res.ok){
        statusMsg.className = 'success';
        statusMsg.textContent = goingLive ? 'You are now live on the website!' : 'Broadcast ended. Site now shows offline.';
        if(!goingLive) liveUrlInput.value = '';
        await refreshStatus();
      } else {
        statusMsg.className = 'error';
        statusMsg.textContent = data.error || 'Something went wrong';
      }
    } catch(e){
      statusMsg.className = 'error';
      statusMsg.textContent = 'Could not reach the server';
    } finally {
      btn.disabled = false;
    }
  }

  refreshStatus();
</script>

</body>
</html>
